<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3ENG.s | تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--p:#F59E0B;--pd:#D97706;--dk:#0F172A;--d2:#1E293B;--br:rgba(245,158,11,.25);--tx:#F1F5F9;--mt:#94A3B8;--ok:#10B981;--er:#EF4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--dk);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 30% 20%,rgba(245,158,11,.1) 0%,transparent 60%),linear-gradient(135deg,#0F172A,#1E293B);}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(245,158,11,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,.03) 1px,transparent 1px);background-size:60px 60px;}
.card{position:relative;z-index:10;background:rgba(30,41,59,.95);backdrop-filter:blur(24px);border:1px solid var(--br);border-radius:20px;width:100%;max-width:440px;padding:40px 36px;box-shadow:0 25px 80px rgba(0,0,0,.5);animation:cIn .5s ease;}
@keyframes cIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
.logo-circle{width:84px;height:84px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 0 0 4px rgba(245,158,11,.3),0 12px 40px rgba(0,0,0,.4);}
.logo-circle img{width:68px;height:68px;object-fit:contain;border-radius:50%;}
.lname{font-size:1.4rem;font-weight:900;color:var(--p);}
.lsub{font-size:.7rem;color:var(--mt);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.tabs{display:flex;background:rgba(15,23,42,.6);border-radius:10px;padding:4px;margin-bottom:26px;border:1px solid var(--br);}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--mt);font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;border-radius:8px;cursor:pointer;transition:all .25s;}
.tab.active{background:var(--p);color:var(--dk);}
.pnl{display:none;animation:pIn .3s ease;}
.pnl.active{display:block;}
@keyframes pIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fg{margin-bottom:15px;}
.fg label{display:block;font-size:.77rem;font-weight:700;color:var(--mt);margin-bottom:7px;}
.inp-w{position:relative;}
.inp-w .ico{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.5;pointer-events:none;}
.fg input{width:100%;padding:12px 40px 12px 14px;background:rgba(15,23,42,.7);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--tx);font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;transition:border-color .25s;}
.fg input:focus{border-color:var(--p);}
.fg input::placeholder{color:var(--mt);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-main{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--p),var(--pd));color:var(--dk);font-family:'Cairo',sans-serif;font-size:.97rem;font-weight:900;cursor:pointer;transition:all .25s;margin-top:4px;}
.btn-main:hover{transform:translateY(-2px);}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
.divider span{font-size:.78rem;color:var(--mt);font-weight:700;}
.btn-google{width:100%;padding:13px 18px;border-radius:10px;background:white;color:#3c4043;border:1px solid #dadce0;font-family:'Cairo',sans-serif;font-size:.93rem;font-weight:700;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:11px;}
.btn-google:hover{background:#f8f9fa;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.btn-google svg{width:20px;height:20px;flex-shrink:0;}
.forgot{text-align:left;margin-top:8px;}
.forgot a{color:var(--p);font-size:.8rem;text-decoration:none;font-weight:700;}
.alert{padding:11px 14px;border-radius:8px;font-size:.83rem;font-weight:700;margin-bottom:14px;display:none;align-items:center;gap:9px;}
.alert.show{display:flex;}
.alert.ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--ok);}
.alert.er{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--er);}
.back{display:flex;align-items:center;gap:7px;color:var(--mt);text-decoration:none;font-size:.8rem;font-weight:700;margin-bottom:20px;transition:color .2s;}
.back:hover{color:var(--p);}
.spin-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.85);backdrop-filter:blur(8px);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.spin-ov.show{display:flex;}
.spin{width:46px;height:46px;border:3px solid var(--br);border-top-color:var(--p);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-ov p{font-size:.92rem;color:var(--mt);font-weight:600;}
@media(max-width:480px){.card{padding:28px 20px;}.frow{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="bg"></div><div class="bg-grid"></div>
<div class="spin-ov" id="ov"><div class="spin"></div><p id="ovMsg">جاري التحقق...</p></div>
<div class="card">
  <a href="index.html" class="back">← العودة للموقع</a>
  <div class="logo-wrap">
    <div class="logo-circle"><img src="logo.jpg" alt="3ENG.s" onerror="this.parentElement.innerHTML='<span style=font-size:2.2rem>💡</span>'"></div>
    <div class="lname">3ENG.s</div>
    <div class="lsub">Smart Idea • الهندسة الكهربائية</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login',this)">تسجيل الدخول</button>
    <button class="tab" onclick="switchTab('signup',this)">حساب جديد</button>
  </div>
  <div class="alert" id="alertBox"><span id="alertIcon"></span><span id="alertMsg"></span></div>
  <!-- LOGIN -->
  <div class="pnl active" id="pLogin">
    <div class="fg"><label>البريد الإلكتروني</label><div class="inp-w"><span class="ico">📧</span><input type="email" id="l-email" placeholder="example@email.com" dir="ltr" autocomplete="email"></div></div>
    <div class="fg"><label>كلمة المرور</label><div class="inp-w"><span class="ico">🔒</span><input type="password" id="l-pass" placeholder="••••••••" dir="ltr" autocomplete="current-password"></div></div>
    <div class="forgot"><a href="#" onclick="doForgot();return false">نسيت كلمة المرور؟</a></div>
    <br>
    <button class="btn-main" onclick="doLogin()">تسجيل الدخول ⚡</button>
    <div class="divider"><span>أو</span></div>
    <button class="btn-google" onclick="doGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      الدخول بـ Google
    </button>
  </div>
  <!-- SIGNUP -->
  <div class="pnl" id="pSignup">
    <div class="frow">
      <div class="fg"><label>الاسم الأول *</label><div class="inp-w"><span class="ico">👤</span><input type="text" id="s-fname" placeholder="أحمد"></div></div>
      <div class="fg"><label>اسم العائلة</label><div class="inp-w"><span class="ico">👤</span><input type="text" id="s-lname" placeholder="محمد"></div></div>
    </div>
    <div class="fg"><label>البريد الإلكتروني *</label><div class="inp-w"><span class="ico">📧</span><input type="email" id="s-email" placeholder="example@email.com" dir="ltr"></div></div>
    <div class="frow">
      <div class="fg"><label>كلمة المرور *</label><div class="inp-w"><span class="ico">🔒</span><input type="password" id="s-pass" placeholder="••••••••" dir="ltr"></div></div>
      <div class="fg"><label>تأكيد المرور *</label><div class="inp-w"><span class="ico">🔒</span><input type="password" id="s-pass2" placeholder="••••••••" dir="ltr"></div></div>
    </div>
    <button class="btn-main" onclick="doSignup()">إنشاء الحساب 🚀</button>
    <div class="divider"><span>أو</span></div>
    <button class="btn-google" onclick="doGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      التسجيل بـ Google
    </button>
  </div>
  <div style="text-align:center;margin-top:20px;font-size:.78rem;color:var(--mt)">بالتسجيل أنت توافق على <a href="#" style="color:var(--p);text-decoration:none;font-weight:700">شروط الاستخدام</a></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CFG={apiKey:"AIzaSyALJiF8l_wnk_6FU6etQpz44Z43lSORXQk",authDomain:"engs-website.firebaseapp.com",projectId:"engs-website",storageBucket:"engs-website.firebasestorage.app",messagingSenderId:"1028163586505",appId:"1:1028163586505:web:c09de00bb30a3369ca4018",measurementId:"G-GZJCYL5YM8"};
const ADMINS=['hosam2564491@gmail.com','info@3engs.com'];
const app=initializeApp(CFG); getAnalytics(app);
const auth=getAuth(app); const db=getFirestore(app); const gp=new GoogleAuthProvider();

// If already logged in redirect
onAuthStateChanged(auth, async user => {
  if(user) {
    await saveUser(user, user.providerData?.[0]?.providerId||'email');
    const isAdmin = ADMINS.includes(user.email);
    window.location.href = isAdmin ? 'admin.html' : 'index.html';
  }
});

async function saveUser(user, provider='email'){
  const ref=doc(db,'users',user.uid);
  const snap=await getDoc(ref);
  const isAdmin=ADMINS.includes(user.email);
  if(!snap.exists()){
    await setDoc(ref,{uid:user.uid,email:user.email,displayName:user.displayName||'',photoURL:user.photoURL||'',provider:provider.includes('google')?'google':'email',role:isAdmin?'admin':'user',createdAt:serverTimestamp(),lastLogin:serverTimestamp()});
  } else {
    await setDoc(ref,{lastLogin:serverTimestamp(),photoURL:user.photoURL||''},{merge:true});
  }
}

function showOv(show,msg='جاري التحقق...'){
  document.getElementById('ovMsg').textContent=msg;
  document.getElementById('ov').classList.toggle('show',show);
}
function showAlert(msg,type='er'){
  const b=document.getElementById('alertBox');
  document.getElementById('alertMsg').textContent=msg;
  document.getElementById('alertIcon').textContent=type==='ok'?'✅':'⚠️';
  b.className='alert '+type+' show';
  if(type!=='ok') setTimeout(()=>b.classList.remove('show'),5000);
}
const errs={'auth/user-not-found':'البريد غير مسجل','auth/wrong-password':'كلمة المرور غير صحيحة','auth/invalid-credential':'البريد أو كلمة المرور غير صحيحة','auth/too-many-requests':'تجاوزت عدد المحاولات','auth/email-already-in-use':'البريد مسجل مسبقاً','auth/weak-password':'كلمة المرور ضعيفة جداً','auth/invalid-email':'البريد غير صحيح'};

window.doLogin=async()=>{
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){showAlert('يرجى ملء جميع الحقول');return;}
  showOv(true,'جاري تسجيل الدخول...');
  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){showOv(false);showAlert(errs[e.code]||e.message);}
};
window.doSignup=async()=>{
  const fn=document.getElementById('s-fname').value.trim();
  const ln=document.getElementById('s-lname').value.trim();
  const email=document.getElementById('s-email').value.trim();
  const pass=document.getElementById('s-pass').value;
  const pass2=document.getElementById('s-pass2').value;
  if(!fn||!email||!pass){showAlert('يرجى ملء الحقول الإلزامية (*)');return;}
  if(pass!==pass2){showAlert('كلمتا المرور غير متطابقتين');return;}
  if(pass.length<6){showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');return;}
  showOv(true,'جاري إنشاء الحساب...');
  try{
    const c=await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(c.user,{displayName:`${fn} ${ln}`.trim()});
    await saveUser(c.user,'email');
  }catch(e){showOv(false);showAlert(errs[e.code]||e.message);}
};
window.doGoogle=async()=>{
  showOv(true,'جاري التسجيل عبر Google...');
  try{ await signInWithPopup(auth,gp); }
  catch(e){showOv(false);if(e.code!=='auth/popup-closed-by-user')showAlert('فشل الاتصال بـ Google');}
};
window.doForgot=async()=>{
  const email=document.getElementById('l-email').value.trim();
  if(!email){showAlert('أدخل بريدك في حقل البريد أولاً');return;}
  try{await sendPasswordResetEmail(auth,email);showAlert('✅ تم إرسال رابط إعادة التعيين','ok');}
  catch(e){showAlert(errs[e.code]||e.message);}
};
</script>
<script>
function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
  document.getElementById('pLogin').classList.toggle('active',tab==='login');
  document.getElementById('pSignup').classList.toggle('active',tab==='signup');
  document.getElementById('alertBox').classList.remove('show');
}
document.addEventListener('keypress',e=>{if(e.key==='Enter'){if(document.getElementById('pLogin').classList.contains('active'))window.doLogin?.();else window.doSignup?.();}});
</script>
</body>
</html>
